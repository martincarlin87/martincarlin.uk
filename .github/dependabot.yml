version: 2

updates:
  # ────────────────────────── COMPOSER ─────────────────────────────
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels: [dependencies, php]
    commit-message:
      prefix: composer
    groups:
      composer-minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # Don't auto-PR major bumps for the framework — they need manual review.
      - dependency-name: laravel/framework
        update-types: [version-update:semver-major]
      - dependency-name: laravel/fortify
        update-types: [version-update:semver-major]
      - dependency-name: pestphp/pest
        update-types: [version-update:semver-major]
      - dependency-name: phpunit/phpunit
        update-types: [version-update:semver-major]

  # ────────────────────────── NPM ──────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels: [dependencies, javascript]
    commit-message:
      prefix: npm
    groups:
      types:
        patterns: ['@types/*']
      radix-ui:
        patterns: ['@radix-ui/*']
      eslint-and-prettier:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'prettier*'
          - 'typescript-eslint'
      npm-minor-and-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: tailwindcss
        update-types: [version-update:semver-major]
      - dependency-name: vite
        update-types: [version-update:semver-major]

  # ────────────────────────── GITHUB ACTIONS ───────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/London
    open-pull-requests-limit: 3
    labels: [dependencies, ci]
    commit-message:
      prefix: actions
    groups:
      actions:
        patterns: ['*']
