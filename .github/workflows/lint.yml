name: lint

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  php:
    name: php (pint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Validate composer files
        run: composer validate --strict --no-check-publish

      - name: Cache composer vendor
        id: composer-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php8.4-

      - name: Install Dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Pint
        run: composer lint:check

  js:
    name: js (eslint, prettier, tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Cache composer vendor
        id: composer-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php8.4-

      - name: Install PHP dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Generate Wayfinder routes/actions
        # eslint-plugin-import resolves @/routes and @/actions/* against the
        # generated TS files; without these, those imports get classified as
        # "unknown" and the import/order rule sorts them differently from local.
        # --with-form matches the Vite plugin's `formVariants: true` so .form()
        # helpers are present for tsc to type-check.
        run: php artisan wayfinder:generate --with-form

      - name: Install Node dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:check

      - name: Prettier
        run: npm run format:check

      - name: TypeScript
        run: npm run types:check
