name: deploy

on:
  workflow_run:
    workflows: ['tests']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy to production
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    # Only run when triggered manually OR when the tests workflow succeeded on main
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies (production only)
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Generate .env from secrets and vars
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_NAME: ${{ vars.APP_NAME }}
          APP_ENV: ${{ vars.APP_ENV }}
          APP_DEBUG: ${{ vars.APP_DEBUG }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          cat > .env <<ENV
          APP_NAME="${APP_NAME}"
          APP_ENV=${APP_ENV}
          APP_KEY=${APP_KEY}
          APP_DEBUG=${APP_DEBUG}
          APP_URL=${APP_URL}

          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=en_US
          APP_MAINTENANCE_DRIVER=file

          BCRYPT_ROUNDS=12

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=warning

          DB_CONNECTION=sqlite

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=database
          CACHE_STORE=database

          MAIL_MAILER=log
          MAIL_FROM_ADDRESS="martin@martincarlin.uk"
          MAIL_FROM_NAME="\${APP_NAME}"

          VITE_APP_NAME="\${APP_NAME}"
          ENV

      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SERVER: ${{ vars.DEPLOY_SERVER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_SERVER" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync release to server
        env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_SERVER: ${{ vars.DEPLOY_SERVER }}
          DEPLOY_BASE_DIR: ${{ vars.DEPLOY_BASE_DIR }}
        run: |
          rsync -az --delete \
            --exclude-from=- \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            ./ "${DEPLOY_USER}@${DEPLOY_SERVER}:${DEPLOY_BASE_DIR}/" <<'EXCLUDES'
          .git
          .github
          .gitignore
          .gitattributes
          .editorconfig
          .prettierignore
          .prettierrc
          .npmrc
          .ai
          .claude
          .junie
          .mcp.json
          .phpactor.json
          .phpstan-cache
          .phpunit.cache
          .phpunit.result.cache
          node_modules
          tests
          phpstan.neon
          phpunit.xml
          eslint.config.js
          tsconfig.json
          README.md
          AGENTS.md
          CLAUDE.md
          boost.json
          components.json
          pint.json
          pnpm-workspace.yaml
          /storage/logs/*.log
          /storage/framework/cache/data/*
          /storage/framework/sessions/*
          /storage/framework/views/*
          /database/database.sqlite
          EXCLUDES

      - name: Run post-deploy commands on server
        env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_SERVER: ${{ vars.DEPLOY_SERVER }}
          DEPLOY_BASE_DIR: ${{ vars.DEPLOY_BASE_DIR }}
        run: |
          ssh -i ~/.ssh/id_deploy "${DEPLOY_USER}@${DEPLOY_SERVER}" "set -e
          cd ${DEPLOY_BASE_DIR}
          touch database/database.sqlite
          chmod 664 database/database.sqlite
          php artisan migrate --force
          php artisan storage:link --force 2>/dev/null || true
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          sudo -n systemctl reload php8.4-fpm 2>/dev/null || sudo -n systemctl reload php-fpm 2>/dev/null || true"
