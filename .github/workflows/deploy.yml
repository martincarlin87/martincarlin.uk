name: deploy

# Deploy fires whenever any of the three CI workflows completes on main.
# A `gate` job verifies that ALL THREE (tests, lint, static-analysis) have
# succeeded for the same commit — otherwise the deploy job is skipped or
# failed accordingly. Manual runs via workflow_dispatch bypass the gate.
on:
  workflow_run:
    workflows: [tests, lint, static-analysis]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

# Gate needs `actions: read` to query other workflows' run status.
# Deploy needs `contents: read` for checkout. Nothing else.
permissions:
  contents: read
  actions: read

jobs:
  # ────────────────────────── GATE ─────────────────────────────────
  # Always runs. Decides whether the deploy job should proceed by querying
  # the latest run of each required workflow for the same SHA:
  #   - all three succeeded  → proceed = true
  #   - any one failed       → exit 1 (gate red, deploy never runs)
  #   - any not yet complete → proceed = false (silent skip; the next
  #                            workflow_run firing for this SHA will retry)
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.head_branch == 'main'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      sha: ${{ steps.check.outputs.sha }}
    steps:
      - name: Resolve commit and verify required workflows
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          WR_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SHA="$DISPATCH_SHA"
            echo "Manual dispatch — bypassing gate for $SHA."
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHA="$WR_SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Checking required workflows for $SHA"

          all_ready=true
          for workflow in tests.yml lint.yml static-analysis.yml; do
            result=$(gh run list \
              --repo "$REPO" \
              --workflow "$workflow" \
              --commit "$SHA" \
              --limit 1 \
              --json status,conclusion 2>/dev/null || echo '[]')

            status=$(echo "$result" | jq -r '.[0].status // "missing"')
            conclusion=$(echo "$result" | jq -r '.[0].conclusion // "null"')

            printf '  %-22s status=%-12s conclusion=%s\n' "$workflow" "$status" "$conclusion"

            if [ "$status" = "missing" ] || [ "$status" != "completed" ]; then
              all_ready=false
            elif [ "$conclusion" != "success" ]; then
              echo "::error::$workflow finished with conclusion '$conclusion' — aborting deploy."
              exit 1
            fi
          done

          if [ "$all_ready" = "true" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "All required workflows succeeded for $SHA. Proceeding."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Not all workflows have completed for $SHA yet. Skipping; the next workflow_run firing will retry."
          fi

  # ────────────────────────── DEPLOY ───────────────────────────────
  deploy:
    name: deploy to production
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies (production only)
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Generate .env from secrets and vars
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_NAME: ${{ vars.APP_NAME }}
          APP_ENV: ${{ vars.APP_ENV }}
          APP_DEBUG: ${{ vars.APP_DEBUG }}
          APP_URL: ${{ vars.APP_URL }}
          SMTP2GO_API_KEY: ${{ secrets.SMTP2GO_API_KEY }}
          CONTACT_FROM_ADDRESS: ${{ vars.CONTACT_FROM_ADDRESS }}
          CONTACT_TO_ADDRESS: ${{ vars.CONTACT_TO_ADDRESS }}
        run: |
          cat > .env <<ENV
          APP_NAME="${APP_NAME}"
          APP_ENV=${APP_ENV}
          APP_KEY=${APP_KEY}
          APP_DEBUG=${APP_DEBUG}
          APP_URL=${APP_URL}

          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=en_US
          APP_MAINTENANCE_DRIVER=file

          BCRYPT_ROUNDS=12

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=warning

          DB_CONNECTION=sqlite

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=database
          CACHE_STORE=database

          MAIL_MAILER=log
          MAIL_FROM_ADDRESS="martin@martincarlin.uk"
          MAIL_FROM_NAME="\${APP_NAME}"

          SMTP2GO_API_KEY=${SMTP2GO_API_KEY}
          CONTACT_FROM_ADDRESS=${CONTACT_FROM_ADDRESS:-noreply@martincarlin.uk}
          CONTACT_TO_ADDRESS=${CONTACT_TO_ADDRESS:-martin@martincarlin.uk}

          VITE_APP_NAME="\${APP_NAME}"
          ENV

      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SERVER: ${{ vars.DEPLOY_SERVER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_SERVER" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync release to server
        env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_SERVER: ${{ vars.DEPLOY_SERVER }}
          DEPLOY_BASE_DIR: ${{ vars.DEPLOY_BASE_DIR }}
        run: |
          rsync -az --delete \
            --exclude-from=- \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            ./ "${DEPLOY_USER}@${DEPLOY_SERVER}:${DEPLOY_BASE_DIR}/" <<'EXCLUDES'
          .git
          .github
          .gitignore
          .gitattributes
          .editorconfig
          .prettierignore
          .prettierrc
          .npmrc
          .ai
          .claude
          .junie
          .mcp.json
          .phpactor.json
          .phpstan-cache
          .phpunit.cache
          .phpunit.result.cache
          node_modules
          tests
          phpstan.neon
          phpunit.xml
          eslint.config.js
          tsconfig.json
          README.md
          AGENTS.md
          CLAUDE.md
          boost.json
          components.json
          pint.json
          pnpm-workspace.yaml
          /storage/logs/*.log
          /storage/framework/cache/data/*
          /storage/framework/sessions/*
          /storage/framework/views/*
          /database/database.sqlite
          EXCLUDES

      - name: Run post-deploy commands on server
        env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_SERVER: ${{ vars.DEPLOY_SERVER }}
          DEPLOY_BASE_DIR: ${{ vars.DEPLOY_BASE_DIR }}
        run: |
          ssh -i ~/.ssh/id_deploy "${DEPLOY_USER}@${DEPLOY_SERVER}" "set -e
          cd ${DEPLOY_BASE_DIR}
          touch database/database.sqlite
          chmod 664 database/database.sqlite
          php artisan migrate --force
          php artisan storage:link --force 2>/dev/null || true
          # Ensure web server (www-data) can write to runtime dirs. deploy is
          # in the www-data group so chgrp/chmod work without sudo. Filter to
          # files owned by deploy — files PHP-FPM created (owned by www-data)
          # already have the correct group and chgrp on them would fail with
          # 'Operation not permitted' since deploy can only chgrp what it owns.
          # Setgid (2xxx) on dirs makes new files inherit www-data group.
          find storage bootstrap/cache -user deploy -exec chgrp www-data {} +
          find storage bootstrap/cache -user deploy -type d -exec chmod 2775 {} +
          find storage bootstrap/cache -user deploy -type f -exec chmod 0664 {} +
          chgrp www-data database/database.sqlite 2>/dev/null || true
          chmod 0664 database/database.sqlite
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          sudo -n systemctl reload php8.4-fpm 2>/dev/null || sudo -n systemctl reload php-fpm 2>/dev/null || true"
