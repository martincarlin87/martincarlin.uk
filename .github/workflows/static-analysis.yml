name: static-analysis

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'

permissions:
  contents: read

concurrency:
  group: static-analysis-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  phpstan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Cache composer vendor
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php8.4-

      - name: Install Dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Cache PHPStan result
        uses: actions/cache@v4
        with:
          path: .phpstan-cache
          key: phpstan-${{ runner.os }}-${{ hashFiles('**/composer.lock', 'phpstan.neon') }}-${{ github.sha }}
          restore-keys: |
            phpstan-${{ runner.os }}-${{ hashFiles('**/composer.lock', 'phpstan.neon') }}-
            phpstan-${{ runner.os }}-

      - name: Larastan / PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=2G --no-progress --error-format=github
